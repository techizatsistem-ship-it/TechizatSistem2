<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel — Qaimə Sistemi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f2f2f2;color:#222}
input,select,textarea,button{font-size:15px;padding:8px;border:1px solid #ccc;border-radius:5px;width:100%;margin-top:4px}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;width:auto;padding:8px 14px}
button.sec{background:#666}
button.danger{background:#c0392b}
label{font-size:13px;color:#555;margin-top:8px;display:block}
.hidden{display:none!important}
#loginBox{max-width:320px;margin:80px auto;background:#fff;padding:20px;border-radius:8px}
header{background:#1e293b;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
header .tabs{display:flex;gap:6px;flex-wrap:wrap}
header .tabs button{background:#334155;padding:6px 10px}
header .tabs button.active{background:#2563eb}
#userInfo{font-size:13px}
main{padding:12px;max-width:900px;margin:0 auto}
.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px}
.row{border:1px solid #ddd;border-radius:6px;margin-bottom:6px;padding:8px;background:#fff;cursor:pointer}
.row.tecili{border:2px solid #c0392b}
.line-grid{display:grid;grid-template-columns:50px 110px 1fr 1fr 1fr 90px 90px;gap:8px;align-items:center;font-size:14px}
.line-grid b{color:#2563eb}
.small{font-size:12px;color:#666}
.badge{background:#c0392b;color:#fff;border-radius:12px;padding:2px 8px;font-size:12px}
.thumb{width:44px;height:44px;object-fit:cover;border-radius:4px;cursor:pointer}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:10px}
.modal .box{background:#fff;padding:16px;border-radius:8px;max-width:460px;width:100%;max-height:90vh;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
td,th{border:1px solid #ddd;padding:6px;text-align:left}
.chip{display:inline-block;background:#e2e8f0;padding:2px 8px;border-radius:10px;font-size:12px;margin:2px}
.roleChk{display:flex;gap:4px;align-items:center;width:auto;padding:4px 0}
.roleChk input{width:auto;margin:0}
.userRow{display:flex;justify-content:space-between;align-items:center;border:1px solid #ddd;border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer}
#viewerModal{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;z-index:60}
#viewerModal .bar{display:flex;gap:8px;padding:10px;padding-top:calc(10px + env(safe-area-inset-top));justify-content:center;flex-wrap:wrap;flex-shrink:0;background:#000}
#viewerModal img{max-width:100%;max-height:80vh;margin:0;position:absolute;top:50%;left:50%}
#vWrap{flex:1;overflow:hidden;display:flex;touch-action:none;position:relative}
</style>
</head>
<body>

<div id="loginBox">
  <h3>Admin Giriş</h3>
  <label>İstifadəçi adı</label>
  <input id="loginUser" value="admin" onkeydown="if(event.key==='Enter') doLogin()">
  <label>Şifrə</label>
  <input id="loginPass" type="password" onkeydown="if(event.key==='Enter') doLogin()">
  <button style="margin-top:12px;width:100%" onclick="doLogin()">Daxil ol</button>
  <div id="loginErr" class="small" style="color:red"></div>
</div>

<div id="app" class="hidden">
<header>
  <div class="tabs" id="navTabs"></div>
  <div id="userInfo"></div>
</header>
<main id="main"></main>
</div>
<div id="modalRoot"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCy5J5pqsD7hLAjzS_MDTByS3avGeXKsE",
  authDomain: "techizatsistemfirebase.firebaseapp.com",
  projectId: "techizatsistemfirebase",
  storageBucket: "techizatsistemfirebase.firebasestorage.app",
  messagingSenderId: "257272547255",
  appId: "1:257272547255:web:54a2c6e0d7d1a80baf0a32"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ALL_ROLES = ['sifarisci','anbar','korporativ','istehsalat'];

let currentUser = JSON.parse(sessionStorage.getItem('admincu')||'null');
let qaimeler = [];
let users = [];
let failedDeletes = [];
let curNav = 'users';

function roleLabel(r){ return {sifarisci:'Sifarişçi',anbar:'Sistem İşçisi',korporativ:'Korporativ',admin:'Admin',istehsalat:'İstehsalat'}[r]||r; }
function fmtDate(ts){ if(!ts) return ''; const d = ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('az-AZ')+' '+d.toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}); }
function isToday(ts){ if(!ts) return false; const d=ts.toDate?ts.toDate():new Date(ts); const t=new Date(); return d.toDateString()===t.toDateString(); }
function daysAgo(ts){ if(!ts) return 0; const d=ts.toDate?ts.toDate():new Date(ts); return (Date.now()-d.getTime())/86400000; }
function isTecili(q){ return q.tecili===true || (q.status==='yeni' && daysAgo(q.createdAt)>3); }
function hasOpenProblem(q){ return q.problem && !q.problem.solved; }
function statusLabel(s){ return s==='yeni'?'Yeni':(s==='islemede'?'İşlənir':'Mədaxil edildi'); }
function statusWithWho(q){
  if(q.status==='islemede') return `İşlənir — ${q.isleyen||'?'}`;
  if(q.status==='medaxil') return `Mədaxil edildi — ${q.isleyen||'?'}`;
  return 'Yeni';
}

async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const snap = await db.collection('users').doc(u).get();
  const d = snap.exists ? snap.data() : null;
  const roles = d ? (d.roles || (d.role?[d.role]:[])) : [];
  if(!d || d.password !== p || !roles.includes('admin')){
    document.getElementById('loginErr').innerText = 'Yalnız admin daxil ola bilər';
    return;
  }
  currentUser = {username:u, name:d.name};
  sessionStorage.setItem('admincu', JSON.stringify(currentUser));
  boot();
}
function logout(){ sessionStorage.removeItem('admincu'); location.href = 'index.html'; }

function boot(){
  if(!currentUser) return;
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').innerText = currentUser.name + ' çıxış';
  document.getElementById('userInfo').style.cursor='pointer';
  document.getElementById('userInfo').onclick = logout;
  document.getElementById('navTabs').innerHTML = [['users','İstifadəçilər'],['qaimeler','Qaimlər'],['failed','Silinməyən şəkillər']]
    .map(t=>`<button data-n="${t[0]}" onclick="setNav('${t[0]}')">${t[1]}</button>`).join('');
  db.collection('users').onSnapshot(snap=>{ users = snap.docs.map(d=>({id:d.id, ...d.data()})); render(); });
  db.collection('qaimeler').orderBy('createdAt','desc').onSnapshot(snap=>{ qaimeler = snap.docs.map(d=>({id:d.id, ...d.data()})); render(); });
  db.collection('failedDeletes').orderBy('at','desc').onSnapshot(snap=>{ failedDeletes = snap.docs.map(d=>({id:d.id, ...d.data()})); render(); });
  render();
}
if(currentUser) boot();

function setNav(n){ curNav=n; render(); }

function render(){
  const af = document.activeElement;
  const afId = af && af.id, afStart = af && af.selectionStart, afEnd = af && af.selectionEnd;
  document.querySelectorAll('#navTabs button').forEach(b=>b.classList.toggle('active', b.dataset.n===curNav));
  document.getElementById('main').innerHTML = curNav==='users' ? viewUsers() : (curNav==='qaimeler' ? viewQaimeler() : viewFailedDeletes());
  if(afId){ const el=document.getElementById(afId); if(el){ el.focus(); if(afStart!=null) try{el.setSelectionRange(afStart,afEnd);}catch(e){} } }
}

function viewUsers(){
  const rows = users.map(u=>{
    const roles = u.roles || (u.role?[u.role]:[]);
    return `<div class="userRow" onclick="openUserStats('${u.id}')">
      <div><b>${u.name}</b> <span class="small">(${u.id})</span><br>${roles.map(r=>`<span class="chip">${roleLabel(r)}</span>`).join('')}</div>
      <button class="sec" onclick="event.stopPropagation();openEditUser('${u.id}')">Redaktə</button>
    </div>`;
  }).join('');
  return `<div class="card">
    <h3>İstifadəçilər</h3>
    <button onclick="openEditUser(null)">+ Yeni istifadəçi</button>
    <div style="margin-top:10px">${rows || '<div class="small">Yoxdur</div>'}</div>
  </div>`;
}
function openEditUser(id){
  const u = id ? users.find(x=>x.id===id) : null;
  const roles = u ? (u.roles||(u.role?[u.role]:[])) : [];
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>${u?'İstifadəçini redaktə et':'Yeni istifadəçi'}</h3>
    <label>İstifadəçi adı (login)</label>
    <input id="u_id" value="${u?u.id:''}" ${u?'disabled':''}>
    <label>Ad</label>
    <input id="u_name" value="${u?u.name:''}">
    <label>Şifrə ${u?'(dəyişmək istəmirsinizsə boş buraxın)':''}</label>
    <input id="u_pass" type="text">
    <label>Rollar</label>
    ${ALL_ROLES.map(r=>`<label class="roleChk"><input type="checkbox" value="${r}" ${roles.includes(r)?'checked':''} class="rchk"> ${roleLabel(r)}</label>`).join('')}
    <div id="u_err" class="small" style="color:red"></div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="sec" onclick="closeModal()">Ləğv et</button>
      ${u?`<button class="danger" onclick="deleteUser('${u.id}')">Sil</button>`:''}
      <button onclick="saveUser(${u?`'${u.id}'`:'null'})">Yadda saxla</button>
    </div>
  </div></div>`;
}
async function saveUser(existingId){
  const id = existingId || document.getElementById('u_id').value.trim();
  const name = document.getElementById('u_name').value.trim();
  const pass = document.getElementById('u_pass').value.trim();
  const roles = [...document.querySelectorAll('.rchk:checked')].map(c=>c.value);
  const err = document.getElementById('u_err');
  if(!id || !name || roles.length===0 || (!existingId && !pass)){ err.innerText='Bütün sahələr mütləqdir'; return; }
  const data = {name, roles};
  if(pass) data.password = pass;
  await db.collection('users').doc(id).set(data, {merge:true});
  closeModal();
}
async function deleteUser(id){
  if(!confirm('İstifadəçi silinsin?')) return;
  await db.collection('users').doc(id).delete();
  closeModal();
}
function openUserStats(id){
  const u = users.find(x=>x.id===id);
  const roles = u.roles || (u.role?[u.role]:[]);
  const weekAgo = Date.now()-7*86400000;
  const monthAgo = Date.now()-30*86400000;
  const addedByName = qaimeler.filter(q=>q.sifarisVeren===u.name);
  const workedByName = qaimeler.filter(q=>q.isleyen===u.name);
  const addedToday = addedByName.filter(q=>isToday(q.createdAt)).length;
  const addedMonth = addedByName.filter(q=>q.createdAt && (q.createdAt.toDate?q.createdAt.toDate():new Date(q.createdAt)).getTime()>monthAgo).length;
  const medaxilToday = workedByName.filter(q=>q.status==='medaxil' && isToday(q.tookAt)).length;
  const medaxilWeek = workedByName.filter(q=>q.status==='medaxil' && q.tookAt && (q.tookAt.toDate?q.tookAt.toDate():new Date(q.tookAt)).getTime()>weekAgo).length;
  const active = workedByName.filter(q=>q.status==='islemede').length;
  const tecili = [...addedByName, ...workedByName].filter(isTecili).length;
  const problemli = [...addedByName, ...workedByName].filter(hasOpenProblem).length;
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>${u.name} — Analitika</h3>
    <div class="small" style="margin-bottom:6px">${roles.map(r=>`<span class="chip">${roleLabel(r)}</span>`).join('')}</div>
    <table>
      <tr><td>Bu gün əlavə etdiyi qaimə</td><td>${addedToday}</td></tr>
      <tr><td>Son 30 gündə əlavə etdiyi</td><td>${addedMonth}</td></tr>
      <tr><td>Hazırda üzərində işlədiyi</td><td>${active}</td></tr>
      <tr><td>Bu gün mədaxil etdiyi</td><td>${medaxilToday}</td></tr>
      <tr><td>Son 7 gündə mədaxil etdiyi</td><td>${medaxilWeek}</td></tr>
      <tr><td>Təcili qaimələrdə iştirakı</td><td>${tecili}</td></tr>
      <tr><td>Problemli qaimələrdə iştirakı</td><td>${problemli}</td></tr>
    </table>
    <button class="sec" style="margin-top:10px" onclick="closeModal()">Bağla</button>
  </div></div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function viewQaimeler(){
  const search = document.getElementById('adminSearch')?.value || '';
  let list = qaimeler;
  if(search) list = list.filter(q=> String(q.no).includes(search) || (q.sifarisVeren||'').toLowerCase().includes(search.toLowerCase()) || (q.kimUcun||'').toLowerCase().includes(search.toLowerCase()));
  const rows = list.map(q=>{
    const photos = q.photos||[];
    const thumb = photos[0] ? `<img class="thumb" src="${photos[0]}" onclick="event.stopPropagation();openViewer(${JSON.stringify(photos).replace(/"/g,'&quot;')},0)">` : '<span class="small">—</span>';
    return `<div class="row ${isTecili(q)?'tecili':''}">
    <div class="line-grid">
      <span>${thumb}</span>
      <span><b>Qaimə_${q.no}</b>${q.qType==='istehsalat'?' <span class="chip">İstehsalat</span>':''}<br><span class="small">${fmtDate(q.createdAt)}</span></span>
      <span>${q.sifarisVeren}</span>
      <span>${q.anbar}</span>
      <span>${q.kimUcun}</span>
      <span>${statusWithWho(q)}</span>
      <button class="danger" onclick="event.stopPropagation();adminDeleteQ('${q.id}')">Sil</button>
    </div>
    ${hasOpenProblem(q)?'<span class="badge">Problem</span>':''}
  </div>`;
  }).join('');
  return `<div class="card">
    <h3>Bütün Qaimlər (${list.length})</h3>
    <input id="adminSearch" placeholder="Axtar (№ / sifarişçi / kim üçün)" value="${search}" oninput="render()">
    <div style="margin-top:10px">${rows || '<div class="small">Yoxdur</div>'}</div>
  </div>`;
}
function viewFailedDeletes(){
  const rows = failedDeletes.map(f=>`<div class="row" style="cursor:default">
    <div><b>Qaimə_${f.qaimeNo||'?'}</b> <span class="small">${fmtDate(f.at)}</span></div>
    <div class="small" style="word-break:break-all;margin:4px 0">${(f.urls||[]).join('<br>')}</div>
    <button class="sec" onclick="deleteFailedLog('${f.id}')">Qeydi sil (əl ilə silindi)</button>
  </div>`).join('');
  return `<div class="card">
    <h3>Silinməyən Şəkillər (${failedDeletes.length})</h3>
    <div class="small">Bu şəkillər Cloudinary-dən avtomatik silinə bilmədi. Cloudinary panelindən əl ilə silib, sonra qeydi buradan silin.</div>
    <div style="margin-top:10px">${rows || '<div class="small">Yoxdur</div>'}</div>
  </div>`;
}

let modalHistoryPushed = false;
function pushModalHistory(){
  if(!modalHistoryPushed){
    history.pushState({modalOpen:true}, '');
    modalHistoryPushed = true;
  }
}
window.addEventListener('popstate', ()=>{
  const root = document.getElementById('modalRoot');
  if(root && root.innerHTML !== ''){ root.innerHTML = ''; }
  modalHistoryPushed = false;
});
function closeModalHist(){
  document.getElementById('modalRoot').innerHTML='';
  if(modalHistoryPushed){ modalHistoryPushed = false; history.back(); }
}

function dlUrl(u){ return u.replace('/upload/','/upload/fl_attachment/'); }
function openViewer(photos, idx){
  let rotate = 0, scale = 1, panX = 0, panY = 0, pinchDist = null;
  pushModalHistory();
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div id="viewerModal">
    <div class="bar">
      <button class="sec" onclick="closeModalHist()">Bağla</button>
      <button id="vPrev">◀</button>
      <span id="vCount" style="color:#fff;align-self:center"></span>
      <button id="vNext">▶</button>
      <button id="vRotate">⟳ Döndər</button>
      <a id="vDl"><button>Yüklə</button></a>
    </div>
    <div id="vWrap">
      <img id="vImg" style="max-width:100%;max-height:80vh">
    </div>
  </div>`;
  const img = document.getElementById('vImg');
  const wrap = document.getElementById('vWrap');
  function applyTransform(){
    img.style.transform = `translate(-50%,-50%) translate(${panX}px, ${panY}px) rotate(${rotate}deg) scale(${scale})`;
  }
  function update(){
    img.src = photos[idx];
    applyTransform();
    document.getElementById('vCount').innerText = (idx+1)+'/'+photos.length;
    document.getElementById('vDl').href = dlUrl(photos[idx]);
  }
  document.getElementById('vPrev').onclick = ()=>{ idx=(idx-1+photos.length)%photos.length; rotate=0; scale=1; panX=0; panY=0; update(); };
  document.getElementById('vNext').onclick = ()=>{ idx=(idx+1)%photos.length; rotate=0; scale=1; panX=0; panY=0; update(); };
  document.getElementById('vRotate').onclick = ()=>{ rotate=(rotate+90)%360; applyTransform(); };
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width/2;
    const cy = e.clientY - rect.top - rect.height/2;
    const newScale = Math.max(0.5, Math.min(5, scale + (e.deltaY<0?0.15:-0.15)));
    panX = cx - (cx - panX) * (newScale/scale);
    panY = cy - (cy - panY) * (newScale/scale);
    scale = newScale;
    applyTransform();
  }, {passive:false});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const dx = t0.clientX-t1.clientX, dy = t0.clientY-t1.clientY;
      const dist = Math.hypot(dx,dy);
      const rect = wrap.getBoundingClientRect();
      const midX = (t0.clientX+t1.clientX)/2 - rect.left - rect.width/2;
      const midY = (t0.clientY+t1.clientY)/2 - rect.top - rect.height/2;
      if(pinchDist!=null){
        const newScale = Math.max(0.5, Math.min(5, scale*(dist/pinchDist)));
        panX = midX - (midX - panX) * (newScale/scale);
        panY = midY - (midY - panY) * (newScale/scale);
        scale = newScale;
        applyTransform();
      }
      pinchDist = dist;
    }
  }, {passive:false});
  wrap.addEventListener('touchend', ()=>{ pinchDist=null; });

  let dragging = false, dragStartX=0, dragStartY=0, dragPanX0=0, dragPanY0=0;
  wrap.style.cursor = 'grab';
  wrap.addEventListener('mousedown', e=>{
    dragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragPanX0 = panX; dragPanY0 = panY;
    wrap.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    panX = dragPanX0 + (e.clientX - dragStartX);
    panY = dragPanY0 + (e.clientY - dragStartY);
    applyTransform();
  });
  window.addEventListener('mouseup', ()=>{
    if(dragging){ dragging=false; wrap.style.cursor = 'grab'; }
  });
  wrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1){
      dragging = true;
      dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
      dragPanX0 = panX; dragPanY0 = panY;
    }
  }, {passive:true});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===1 && dragging){
      e.preventDefault();
      panX = dragPanX0 + (e.touches[0].clientX - dragStartX);
      panY = dragPanY0 + (e.touches[0].clientY - dragStartY);
      applyTransform();
    }
  }, {passive:false});
  wrap.addEventListener('touchend', ()=>{ dragging=false; });

  update();
}

const CL_API_KEY = '947222283424236', CL_API_SECRET = 'oDGIa0KI-R6KhOazJR7g5sWMzX0';
async function sha1(str){ const b = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function publicIdFromUrl(url){ const m = url.match(/\/upload\/(?:v\d+\/)?(.+)\.[a-zA-Z0-9]+$/); return m?m[1]:null; }
async function deleteFromCloudinary(url){
  const pid = publicIdFromUrl(url); if(!pid) return true;
  const ts = Math.floor(Date.now()/1000);
  const sig = await sha1(`public_id=${pid}&timestamp=${ts}${CL_API_SECRET}`);
  const fd = new FormData();
  fd.append('public_id', pid); fd.append('timestamp', ts); fd.append('api_key', CL_API_KEY); fd.append('signature', sig);
  try{
    const res = await fetch(`https://api.cloudinary.com/v1_1/u0vnb2cg/image/destroy`, {method:'POST', body:fd});
    const data = await res.json();
    return data.result === 'ok' || data.result === 'not found';
  }catch(e){ console.error(e); return false; }
}
async function deleteQaimePhotos(q){
  const all = [...(q.photos||[]), ...(q.medaxilPhotos||[])];
  const results = await Promise.all(all.map(async u=>({u, ok: await deleteFromCloudinary(u)})));
  const failed = results.filter(r=>!r.ok).map(r=>r.u);
  if(failed.length){
    try{ await db.collection('failedDeletes').add({qaimeNo:q.no||null, urls:failed, at: firebase.firestore.FieldValue.serverTimestamp()}); }catch(e){ console.error(e); }
  }
  return failed;
}
async function adminDeleteQ(id){
  if(!confirm('Bu qaimə tamamilə sistemdən silinsin? Bu əməliyyat geri qaytarılmır.')) return;
  const q = qaimeler.find(x=>x.id===id);
  let failed = [];
  if(q) failed = await deleteQaimePhotos(q);
  await db.collection('qaimeler').doc(id).delete();
  if(failed.length) alert(`Diqqət: ${failed.length} şəkil Cloudinary-dən silinmədi. "Silinməyən şəkillər" bölməsinə qeyd olundu.`);
}
async function deleteFailedLog(id){
  await db.collection('failedDeletes').doc(id).delete();
}
