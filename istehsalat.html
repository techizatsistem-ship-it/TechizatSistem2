<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>İstehsalat — Qaimə Sistemi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f2f2f2;color:#222}
input,select,textarea,button{font-size:15px;padding:8px;border:1px solid #ccc;border-radius:5px;width:100%;margin-top:4px}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;width:auto;padding:8px 14px}
button.sec{background:#666}
button.danger{background:#c0392b}
label{font-size:13px;color:#555;margin-top:8px;display:block}
.hidden{display:none!important}
#loginBox{max-width:320px;margin:80px auto;background:#fff;padding:20px;border-radius:8px}
header{background:#1e293b;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
header .tabs{display:flex;gap:6px;flex-wrap:wrap}
header .tabs button{background:#334155;padding:6px 10px}
header .tabs button.active{background:#2563eb}
#userInfo{font-size:13px}
main{padding:12px;max-width:900px;margin:0 auto}
.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px}
.row{border:1px solid #ddd;border-radius:6px;margin-bottom:6px;padding:8px;background:#fff}
.row.tecili{border:2px solid #c0392b}
.row .line{font-size:14px;cursor:pointer}
.row .line b{color:#2563eb}
.line-grid{display:grid;grid-template-columns:90px 1fr 1fr 1fr 80px;gap:8px;align-items:center}
.line-extras{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.row .details{margin-top:8px;font-size:13px;color:#444;border-top:1px solid #eee;padding-top:8px}
.thumb{width:50px;height:50px;object-fit:cover;border-radius:4px;cursor:pointer}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:10px}
.modal .box{background:#fff;padding:16px;border-radius:8px;max-width:420px;width:100%;max-height:90vh;overflow:auto}
#viewerModal{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;z-index:60}
#viewerModal img{max-width:100%;max-height:80vh;margin:auto;transition:transform .2s}
#viewerModal .bar{display:flex;gap:8px;padding:10px;justify-content:center;flex-wrap:wrap}
.badge{background:#c0392b;color:#fff;border-radius:12px;padding:2px 8px;font-size:12px}
.small{font-size:12px;color:#666}
.imgpick{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.imgpick img{width:60px;height:60px;object-fit:cover;border-radius:4px;cursor:pointer}
.bar-chart div.bg{background:#eee;border-radius:3px;margin:4px 0}
.bar-chart div.fg{background:#2563eb;height:14px;border-radius:3px;color:#fff;font-size:11px;padding-left:4px}
</style>
</head>
<body>

<div id="loginBox">
  <h3>İstehsalat Giriş</h3>
  <label>İstifadəçi adı</label>
  <input id="loginUser" onkeydown="if(event.key==='Enter') doLogin()">
  <label>Şifrə</label>
  <input id="loginPass" type="password" onkeydown="if(event.key==='Enter') doLogin()">
  <button style="margin-top:12px;width:100%" onclick="doLogin()">Daxil ol</button>
  <div id="loginErr" class="small" style="color:red"></div>
</div>

<div id="app" class="hidden">
<header>
  <div class="tabs" id="navTabs"></div>
  <div id="userInfo"></div>
</header>
<main id="main"></main>
</div>
<div id="modalRoot"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCy5J5pqsD7hLAjzS_MDTByS3avGeXKsE",
  authDomain: "techizatsistemfirebase.firebaseapp.com",
  projectId: "techizatsistemfirebase",
  storageBucket: "techizatsistemfirebase.firebasestorage.app",
  messagingSenderId: "257272547255",
  appId: "1:257272547255:web:54a2c6e0d7d1a80baf0a32"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const CLOUD_NAME='u0vnb2cg', UPLOAD_PRESET='TechizatSistemCloudinary';

let currentUser = JSON.parse(sessionStorage.getItem('istehcu')||'null');
let qaimeler = [];
let curNav = 'add';
let dismissed = new Set();
let pendingNotifIds = [];
let pickedFiles = [];
let pendingQaimeler = [];
let sending = false;

const IDB_NAME='qaimeOffline', IDB_STORE='pending';
function idbOpen(){ return new Promise((res,rej)=>{ const req=indexedDB.open(IDB_NAME,1); req.onupgradeneeded=()=>req.result.createObjectStore(IDB_STORE,{keyPath:'localId'}); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
async function idbPut(rec){ const d=await idbOpen(); return new Promise((res,rej)=>{ const tx=d.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(rec); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
async function idbDelete(id){ const d=await idbOpen(); return new Promise((res,rej)=>{ const tx=d.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).delete(id); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
async function idbAll(){ const d=await idbOpen(); return new Promise((res,rej)=>{ const req=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
async function loadPending(){ pendingQaimeler = (await idbAll()).filter(r=>r.qType==='istehsalat'); render(); trySendAll(); }
async function trySendOne(rec){
  if(!rec) return false;
  try{
    const wm = [`Sifarişçi: ${rec.sifarisVeren}`, `Anbar: ${rec.anbar}`, `Kim üçün: ${rec.kimUcun}`, `Ödəniş: ${rec.odenisTipi}`];
    const photos = [];
    for(const f of rec.files){ const blob = await compressImage(f, 1200, 0.7, wm); photos.push(await uploadToCloudinary(blob)); }
    const no = await db.runTransaction(async t=>{
      const ref = db.collection('meta').doc('counter');
      const snap = await t.get(ref);
      const val = (snap.exists? snap.data().value:0)+1;
      t.set(ref,{value:val});
      return val;
    });
    await db.collection('qaimeler').add({
      no, sifarisVeren: rec.sifarisVeren, anbar: rec.anbar, kimUcun: rec.kimUcun, odenisTipi: rec.odenisTipi, qeyd: rec.qeyd,
      tecili: rec.tecili, photos, photosUploading:false, status:'yeni', isleyen:null, problem:null,
      medaxilPhotos: [], medaxilPhotosUploading:false, qType:'istehsalat',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(), medaxilNo:null
    });
    await idbDelete(rec.localId);
    pendingQaimeler = pendingQaimeler.filter(x=>x.localId!==rec.localId);
    render();
    return true;
  }catch(e){ console.error(e); return false; }
}
async function trySendAll(){
  if(sending || !navigator.onLine) return;
  sending = true;
  for(const rec of [...pendingQaimeler]){ await trySendOne(rec); }
  sending = false;
}
window.addEventListener('online', trySendAll);
setInterval(trySendAll, 20000);

async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const snap = await db.collection('users').doc(u).get();
  const d = snap.exists ? snap.data() : null;
  const roles = d ? (d.roles || (d.role?[d.role]:[])) : [];
  if(!d || d.password !== p || !roles.includes('istehsalat')){
    document.getElementById('loginErr').innerText = 'İstifadəçi adı və ya şifrə yanlışdır';
    return;
  }
  currentUser = {username:u, name:d.name};
  sessionStorage.setItem('istehcu', JSON.stringify(currentUser));
  boot();
}
function logout(){ sessionStorage.removeItem('istehcu'); location.href = 'index.html'; }

function boot(){
  if(!currentUser) return;
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').innerText = currentUser.name + ' çıxış';
  document.getElementById('userInfo').style.cursor='pointer';
  document.getElementById('userInfo').onclick = logout;
  document.getElementById('navTabs').innerHTML = [['add','Qaimə Əlavə Et'],['mine','Mənim Qaimlərim'],['stats','Analitika']]
    .map(t=>`<button data-n="${t[0]}" onclick="setNav('${t[0]}')">${t[1]}</button>`).join('');
  db.collection('qaimeler').orderBy('createdAt','desc').onSnapshot(snap=>{
    qaimeler = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(q=>q.qType==='istehsalat');
    render();
    checkNotifications();
  });
  loadPending();
  render();
}
if(currentUser) boot();

function setNav(n){ curNav=n; render(); }

function fmtDate(ts){ if(!ts) return ''; const d = ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('az-AZ')+' '+d.toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}); }
function isToday(ts){ if(!ts) return false; const d=ts.toDate?ts.toDate():new Date(ts); const t=new Date(); return d.toDateString()===t.toDateString(); }
function daysAgo(ts){ if(!ts) return 0; const d=ts.toDate?ts.toDate():new Date(ts); return (Date.now()-d.getTime())/86400000; }
function isTecili(q){ return q.tecili===true || (q.status==='yeni' && daysAgo(q.createdAt)>3); }
function hasOpenProblem(q){ return q.problem && !q.problem.solved; }
function statusLabel(s){ return s==='yeni'?'Yeni':(s==='islemede'?'İşlənir':'Mədaxil edildi'); }

function render(){
  const af = document.activeElement;
  const afId = af && af.id, afStart = af && af.selectionStart, afEnd = af && af.selectionEnd;
  document.querySelectorAll('#navTabs button').forEach(b=>b.classList.toggle('active', b.dataset.n===curNav));
  const mineBtn = document.querySelector('#navTabs button[data-n="mine"]');
  if(mineBtn) mineBtn.innerHTML = 'Mənim Qaimlərim' + (pendingQaimeler.length?` <span class="badge">${pendingQaimeler.length}</span>`:'');
  const m = document.getElementById('main');
  if(curNav==='add') m.innerHTML = viewAddForm();
  else if(curNav==='mine') m.innerHTML = viewMine();
  else m.innerHTML = viewStats();
  if(afId){ const el=document.getElementById(afId); if(el && el.focus){ el.focus(); if(afStart!=null && el.setSelectionRange) try{el.setSelectionRange(afStart,afEnd);}catch(e){} } }
}

function viewAddForm(){
  const kimUcunList = [...new Set(qaimeler.map(q=>q.kimUcun).filter(Boolean))];
  const anbarList = [...new Set(qaimeler.map(q=>q.anbar).filter(Boolean))];
  return `<div class="card">
    <h3>Qaimə Əlavə Et</h3>
    <label>Sifariş Verən</label>
    <input value="${currentUser.name}" disabled>
    <label>Hansı anbara alındı *</label>
    <input id="f_anbar" list="dl_anbar">
    <datalist id="dl_anbar">${anbarList.map(a=>`<option value="${a}">`).join('')}</datalist>
    <label>Kim üçün alındı *</label>
    <input id="f_kim" list="dl_kim">
    <datalist id="dl_kim">${kimUcunList.map(a=>`<option value="${a}">`).join('')}</datalist>
    <label>Ödəniş tipi *</label>
    <select id="f_odenis"><option value="">Seçin</option><option>Köçürmə</option><option>Nağd</option></select>
    <label>Qeyd</label>
    <textarea id="f_qeyd" rows="2"></textarea>
    <label><input type="checkbox" id="f_tecili" style="width:auto"> Təcilidir</label>
    <label>Şəkillər</label>
    <div style="display:flex;gap:6px">
      <input type="file" id="f_cam" accept="image/*" capture="environment" multiple style="display:none" onchange="onPick(event)">
      <input type="file" id="f_gal" accept="image/*" multiple style="display:none" onchange="onPick(event)">
      <button type="button" onclick="document.getElementById('f_cam').click()">📷 Şəkil çək</button>
      <button type="button" class="sec" onclick="document.getElementById('f_gal').click()">🖼 Fayldan seç</button>
    </div>
    <div class="imgpick" id="picPreview"></div>
    <div id="addErr" class="small" style="color:red"></div>
    <button id="submitBtn" style="margin-top:12px" onclick="submitQaime()">Əlavə Et</button>
  </div>`;
}
function onPick(e){
  [...e.target.files].forEach(f=>{
    const url = URL.createObjectURL(f);
    pickedFiles.push({file:f, url});
  });
  e.target.value='';
  renderPreview();
}
function renderPreview(){
  const urls = pickedFiles.map(p=>p.url);
  document.getElementById('picPreview').innerHTML = pickedFiles.map((p,i)=>
    `<div style="position:relative"><img src="${p.url}" onclick="openViewer(${JSON.stringify(urls).replace(/"/g,'&quot;')},${i})"><button onclick="event.stopPropagation();pickedFiles.splice(${i},1);renderPreview()" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;padding:0;border-radius:50%;background:#c0392b">×</button></div>`
  ).join('');
}
function compressImage(file, maxSize=1200, quality=0.7, wmLines=null){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h){ if(w>maxSize){h=h*maxSize/w; w=maxSize;} } else { if(h>maxSize){w=w*maxSize/h; h=maxSize;} }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        if(wmLines) drawWatermark(ctx, w, wmLines);
        c.toBlob(b=>resolve(b), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function drawWatermark(ctx, w, lines){
  const fs = Math.max(12, w*0.032);
  ctx.font = `bold ${fs}px Arial`;
  ctx.textBaseline = 'top';
  ctx.lineWidth = fs*0.15;
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.2;
  lines.forEach((t,i)=>{ const y=6+i*(fs+4); ctx.strokeText(t,6,y); ctx.fillText(t,6,y); });
  ctx.globalAlpha = 1;
}
function printImage(url){
  let f = document.getElementById('printFrame');
  if(!f){ f = document.createElement('iframe'); f.id='printFrame'; f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0'; document.body.appendChild(f); }
  const doc = f.contentWindow.document;
  doc.open();
  doc.write(`<html><head><style>@page{margin:0}html,body{margin:0;height:100%}body{display:flex;align-items:center;justify-content:center}img{max-width:100vw;max-height:100vh;object-fit:contain}</style></head><body><img src="${url}" onload="setTimeout(()=>{window.focus();window.print();},200)"></body></html>`);
  doc.close();
}
async function uploadToCloudinary(blob){
  const fd = new FormData();
  fd.append('file', blob);
  fd.append('upload_preset', UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST', body:fd});
  const data = await res.json();
  return data.secure_url;
}
async function submitQaime(){
  const anbar = document.getElementById('f_anbar').value.trim();
  const kim = document.getElementById('f_kim').value.trim();
  const odenis = document.getElementById('f_odenis').value;
  const qeyd = document.getElementById('f_qeyd').value.trim();
  const tecili = document.getElementById('f_tecili').checked;
  const err = document.getElementById('addErr');
  if(!anbar || !kim || !odenis){ err.innerText='Anbar, kim üçün və ödəniş tipi mütləqdir'; return; }
  err.innerText = '';
  const rec = {
    localId: 'p'+Date.now()+Math.random().toString(36).slice(2),
    qType:'istehsalat', sifarisVeren: currentUser.name, anbar, kimUcun: kim, odenisTipi: odenis, qeyd, tecili,
    files: pickedFiles.map(p=>p.file)
  };
  await idbPut(rec);
  pendingQaimeler.push(rec);
  pickedFiles = [];
  curNav='mine'; render();
  trySendAll();
}

function viewMine(){
  const mine = qaimeler.filter(q=>q.sifarisVeren===currentUser.name);
  const pend = pendingQaimeler;
  return `<div class="card"><h3>Mənim Qaimlərim (${mine.length})${pend.length?` <span class="badge">${pend.length}</span>`:''}</h3>
    <div class="line-grid small" style="font-weight:bold;padding:4px 8px">
      <span>Qaimə</span><span>Anbar</span><span>Kim üçün</span><span>Ödəniş</span><span>Status</span>
    </div>
    ${pend.map(r=>pendingRowHtml(r)).join('')}
    ${mine.map(q=>rowHtml(q)).join('') || (pend.length?'':'<div class="small">Yoxdur</div>')}</div>`;
}
function pendingRowHtml(rec){
  return `<div class="row tecili">
    <div class="line-grid">
      <span><b>Göndərilməyib</b></span>
      <span>${rec.anbar}</span>
      <span>${rec.kimUcun}</span>
      <span>${rec.odenisTipi}</span>
      <span>Gözləyir</span>
    </div>
    <div class="line-extras">
      <span class="badge">Göndərilməyib</span>
      <span class="small">İnternet gözlənilir...</span>
      <button onclick="trySendOne(pendingQaimeler.find(x=>x.localId==='${rec.localId}'))">Yenidən göndər</button>
    </div>
  </div>`;
}
function rowHtml(q){
  const tecili = isTecili(q);
  const problem = hasOpenProblem(q);
  const photos = q.photos||[];
  const thumb = photos[0] ? `<img class="thumb" src="${photos[0]}" onclick="event.stopPropagation();openViewer(${JSON.stringify(photos).replace(/"/g,'&quot;')},0)">` : '';
  return `<div class="row ${tecili?'tecili':''}">
    <div class="line" onclick="toggleDetails('${q.id}')">
      <div class="line-grid">
        <span><b>Qaimə_${q.no}</b></span>
        <span>${q.anbar}</span>
        <span>${q.kimUcun}</span>
        <span>${q.odenisTipi}</span>
        <span>${statusLabel(q.status)}</span>
      </div>
      <div class="line-extras">
        ${problem?'<span class="badge">Problem</span>':''}
        ${thumb}
        ${q.photosUploading?'<span class="small">şəkil yüklənir...</span>':''}
      </div>
    </div>
    <div class="details hidden" id="det_${q.id}">
      <div>Tarix: ${fmtDate(q.createdAt)}</div>
      <div>Status: ${statusLabel(q.status)}${q.isleyen?(' — İşləyir: '+q.isleyen):''}</div>
      ${q.qeyd?`<div>Qeyd: ${q.qeyd}</div>`:''}
      ${q.medaxilNo?`<div>Mədaxil №: ${q.medaxilNo}</div>`:''}
      ${q.medaxilPhotos && q.medaxilPhotos[0] ? `<div style="margin-top:6px">Mədaxil şəkli: <img class="thumb" src="${q.medaxilPhotos[0]}" onclick="openViewer(${JSON.stringify(q.medaxilPhotos).replace(/"/g,'&quot;')},0)"></div>`:''}
      ${problem?`<div style="color:#c0392b">Problem: ${q.problem.text}</div>`:''}
      ${q.problem && q.problem.solved?`<div style="color:green">Həll: ${q.problem.solution}</div>`:''}
      ${problem?`<button class="danger" style="margin-top:6px" onclick="openResolveModal('${q.id}')">Problemi Həll Et</button>`:''}
      ${q.status==='yeni'?`<div style="display:flex;gap:6px;margin-top:6px">
        <button class="sec" onclick="openEditModal('${q.id}')">Düzəliş et</button>
        <button class="danger" onclick="deleteQaime('${q.id}')">Sil</button>
      </div>`:''}
    </div>
  </div>`;
}
function toggleDetails(id){ document.getElementById('det_'+id).classList.toggle('hidden'); }
function openEditModal(id){
  const q = qaimeler.find(x=>x.id===id);
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Qaimə_${q.no} — Düzəliş</h3>
    <label>Hansı anbara alındı</label><input id="e_anbar" value="${q.anbar}">
    <label>Kim üçün alındı</label><input id="e_kim" value="${q.kimUcun}">
    <label>Ödəniş tipi</label>
    <select id="e_odenis"><option ${q.odenisTipi==='Köçürmə'?'selected':''}>Köçürmə</option><option ${q.odenisTipi==='Nağd'?'selected':''}>Nağd</option></select>
    <label>Qeyd</label><textarea id="e_qeyd" rows="2">${q.qeyd||''}</textarea>
    <label><input type="checkbox" id="e_tecili" style="width:auto" ${q.tecili?'checked':''}> Təcilidir</label>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="sec" onclick="closeModal()">Ləğv et</button>
      <button onclick="saveEdit('${id}')">Yadda saxla</button>
    </div>
  </div></div>`;
}
async function saveEdit(id){
  await db.collection('qaimeler').doc(id).update({
    anbar: document.getElementById('e_anbar').value.trim(),
    kimUcun: document.getElementById('e_kim').value.trim(),
    odenisTipi: document.getElementById('e_odenis').value,
    qeyd: document.getElementById('e_qeyd').value.trim(),
    tecili: document.getElementById('e_tecili').checked
  });
  closeModal();
}
const CL_API_KEY = '947222283424236', CL_API_SECRET = 'oDGIa0KI-R6KhOazJR7g5sWMzX0';
async function sha1(str){ const b = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function publicIdFromUrl(url){ const m = url.match(/\/upload\/(?:v\d+\/)?(.+)\.[a-zA-Z0-9]+$/); return m?m[1]:null; }
async function deleteFromCloudinary(url){
  const pid = publicIdFromUrl(url); if(!pid) return true;
  const ts = Math.floor(Date.now()/1000);
  const sig = await sha1(`public_id=${pid}&timestamp=${ts}${CL_API_SECRET}`);
  const fd = new FormData();
  fd.append('public_id', pid); fd.append('timestamp', ts); fd.append('api_key', CL_API_KEY); fd.append('signature', sig);
  try{
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/destroy`, {method:'POST', body:fd});
    const data = await res.json();
    return data.result === 'ok' || data.result === 'not found';
  }catch(e){ console.error(e); return false; }
}
async function deleteQaimePhotos(q){
  const all = [...(q.photos||[]), ...(q.medaxilPhotos||[])];
  const results = await Promise.all(all.map(async u=>({u, ok: await deleteFromCloudinary(u)})));
  const failed = results.filter(r=>!r.ok).map(r=>r.u);
  if(failed.length){
    try{ await db.collection('failedDeletes').add({qaimeNo:q.no||null, urls:failed, at: firebase.firestore.FieldValue.serverTimestamp()}); }catch(e){ console.error(e); }
  }
  return failed;
}
async function deleteQaime(id){
  if(!confirm('Qaimə silinsin?')) return;
  const q = qaimeler.find(x=>x.id===id);
  let failed = [];
  if(q) failed = await deleteQaimePhotos(q);
  await db.collection('qaimeler').doc(id).delete();
  if(failed.length) alert(`Diqqət: ${failed.length} şəkil Cloudinary-dən silinmədi. Admin panelinə qeyd olundu.`);
}

function openViewer(photos, idx){
  let rotate = 0, scale = 1, pinchDist = null;
  document.getElementById('modalRoot').innerHTML = `<div id="viewerModal">
    <div class="bar">
      <button class="sec" onclick="closeModal()">Bağla</button>
      <button id="vPrev">◀</button>
      <span id="vCount" style="color:#fff;align-self:center"></span>
      <button id="vNext">▶</button>
      <button id="vRotate">⟳ Döndər</button>
      <button id="vPrint">🖨 Çap et</button>
      <a id="vDl"><button>Yüklə</button></a>
    </div>
    <div id="vWrap" style="flex:1;overflow:hidden;display:flex;touch-action:none">
      <img id="vImg" style="max-width:100%;max-height:80vh;margin:auto">
    </div>
  </div>`;
  document.getElementById('vPrint').onclick = ()=> printImage(photos[idx]);
  const img = document.getElementById('vImg');
  function update(){
    img.src = photos[idx];
    img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
    document.getElementById('vCount').innerText = (idx+1)+'/'+photos.length;
    document.getElementById('vDl').href = photos[idx].replace('/upload/','/upload/fl_attachment/');
  }
  document.getElementById('vPrev').onclick = ()=>{ idx=(idx-1+photos.length)%photos.length; rotate=0; scale=1; update(); };
  document.getElementById('vNext').onclick = ()=>{ idx=(idx+1)%photos.length; rotate=0; scale=1; update(); };
  document.getElementById('vRotate').onclick = ()=>{ rotate=(rotate+90)%360; update(); };
  const wrap = document.getElementById('vWrap');
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    scale = Math.max(0.5, Math.min(5, scale + (e.deltaY<0?0.15:-0.15)));
    img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
  }, {passive:false});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
      const dist = Math.hypot(dx,dy);
      if(pinchDist!=null){
        scale = Math.max(0.5, Math.min(5, scale*(dist/pinchDist)));
        img.style.transform = `rotate(${rotate}deg) scale(${scale})`;
      }
      pinchDist = dist;
    }
  }, {passive:false});
  wrap.addEventListener('touchend', ()=>{ pinchDist=null; });
  update();
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function openResolveModal(id){
  const q = qaimeler.find(x=>x.id===id);
  document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
    <h3>Qaimə_${q.no} — Problem</h3>
    ${q.photos&&q.photos[0]?`<img src="${q.photos[0]}" style="width:100%;border-radius:6px;cursor:pointer" onclick="openViewer(${JSON.stringify(q.photos).replace(/"/g,'&quot;')},0)">`:''}
    <div style="color:#c0392b;margin-top:8px">${q.problem.text}</div>
    <label>Problemin həlli *</label>
    <textarea id="solText" rows="3"></textarea>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button onclick="closeModal()" class="sec">Bağla</button>
      <button onclick="saveResolve('${id}')">Həll edildi</button>
    </div>
  </div></div>`;
}
async function saveResolve(id){
  const sol = document.getElementById('solText').value.trim();
  if(!sol) return;
  const q = qaimeler.find(x=>x.id===id);
  await db.collection('qaimeler').doc(id).update({problem:{text:q.problem.text, solved:true, solution:sol}});
  dismissed.add(id);
  closeModal();
}

function checkNotifications(){
  const mine = qaimeler.filter(q=>hasOpenProblem(q) && q.sifarisVeren===currentUser.name && !dismissed.has(q.id));
  if(mine.length>0 && !document.getElementById('modalRoot').innerHTML){
    pendingNotifIds = mine.map(q=>q.id);
    document.getElementById('modalRoot').innerHTML = `<div class="modal"><div class="box">
      <h3>Problemli qaimələr (${mine.length})</h3>
      ${mine.map(q=>`<div class="row" onclick="openResolveModal('${q.id}')" style="cursor:pointer"><b>Qaimə_${q.no}</b> — ${q.problem.text}</div>`).join('')}
      <button class="sec" style="margin-top:10px" onclick="dismissNotifications()">Bağla</button>
    </div></div>`;
  }
}
function dismissNotifications(){
  pendingNotifIds.forEach(id=>dismissed.add(id));
  pendingNotifIds = [];
  closeModal();
}

function viewStats(){
  const total = qaimeler.length;
  const byStatus = {yeni:0, islemede:0, medaxil:0};
  qaimeler.forEach(q=>byStatus[q.status]=(byStatus[q.status]||0)+1);
  const problemli = qaimeler.filter(hasOpenProblem).length;
  const tecili = qaimeler.filter(isTecili).length;

  const days = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return d; }).reverse();
  const dayCounts = days.map(d=> qaimeler.filter(q=>{ if(!q.createdAt) return false; const qd=q.createdAt.toDate?q.createdAt.toDate():new Date(q.createdAt); return qd.toDateString()===d.toDateString(); }).length);
  const maxC = Math.max(1,...dayCounts);
  const chart = `<div class="bar-chart">${days.map((d,i)=>`<div class="small">${d.toLocaleDateString('az-AZ',{weekday:'short',day:'numeric'})}</div><div class="bg"><div class="fg" style="width:${(dayCounts[i]/maxC*100)||2}%">${dayCounts[i]}</div></div>`).join('')}</div>`;

  const mine = qaimeler.filter(q=>q.sifarisVeren===currentUser.name);
  const today = mine.filter(q=>isToday(q.createdAt)).length;

  return `<div class="card"><h3>Ümumi Vəziyyət (İstehsalat)</h3>
    <div>Ümumi qaimə: ${total}</div>
    <div>Yeni: ${byStatus.yeni||0} | İşləmədə: ${byStatus.islemede||0} | Mədaxil olan: ${byStatus.medaxil||0}</div>
    <div>Təcili: ${tecili} | Problemli: ${problemli}</div>
    <h4>Son 7 gün</h4>${chart}
  </div>
  <div class="card"><h3>Mənim Statistikam</h3><div>Ümumi əlavə etdiyim: ${mine.length}</div><div>Bugün: ${today}</div></div>`;
}
